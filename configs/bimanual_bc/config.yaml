  joint_noise_std_scale: 1.0
  feats_noise_std: 0.0
  noisy_skip: False
  frame_skip: 0
  data_filter: {}  # in bash: +data.data_filter={object:blue\ cube}
  history_repeating: 0  # the probability of adding repeating history in the training data
  img_sample_num: -1   # if not doing image sampling, set to -1
  pi_obs_dim: 2312
  pi_act_dim: 8
  loss_weight: 10000
  action_data_ratio: null  # should be a list with same length as demo_dirs
  use_touch: False
  skip_failure: True
  img_downsample: 2

actor:
  type: "transformer"
  num_steps: 16
  im_dim: 1024
  prompt_dim: 1024
  cmd_dim: 3
  obs_dim: 2388
  act_dim: 2412
  num_pred: 1
  num_exec: 1
  look_ahead: 0
  pred_type: "extrap"  # interp / extrap
  pred_action_only: False
  pred_state_only: False
  prompt_loss_weight: 0
  state_loss_weight: 0.1

mlp:
  ws: [256, 128, 64]
  init: "orthogonal"

transformer:
  pos_emb_type: sincos
  hidden_dim: 192
  num_heads: 4
  mlp_ratio: 2.0
  num_blocks: 4
  time_dropout: 0.0

transformer_concat:
  causal: True
  in_proj_hidden_sizes: []
  embed_dim: 384
  num_blocks: 6
  num_heads: 8
  mlp_ratio: 2.0
  attn_dropout: 0.0
  mlp_dropout: 0.0
  last_layer_norm: False
  head_hidden_sizes: []
  normalize_input: True

diffusion:
  num_diffusion_steps: 10

train:
  weights:
  warmup_ep: 10
  num_ep: 100
  mb_size: 128
  lr: 0.0005
  wd: 0.01
  clip_norm: 0.0

tokenizer:
  model_type: 'mlp'
  codebook_sizes: [16384, 16384, 16384, 16384]

train_tokenizer:
  enc_dec_weights:
  train_enc_dec_only: False
  input_noise_scale: 0.

test:
  weights:
  freq: 20

