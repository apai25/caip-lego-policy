data:
  dataset_type: bkl
  features: True
  demo_root: /mnt/amlfs-02/shared/human_egocentric/dniu/datasets/caip_proc
  demo_dirs: ["pick_place_egg"]
  inmem: False
  offset: 0
  num_train: 90
  num_test: 10
  im_size: 224
  cams: ["left_wrist", "right_wrist", "head"]
  prompt_text: "Pick up the egg and place it in the bowl."
  prompt_embedding_path: "configs/bimanual_bc/bkl_pick_place_egg_prompt_embedding.npy"

  # Action normalization stats (run tools/compute_bkl_action_stats.py first)
  action_stats_path: /mnt/amlfs-02/shared/human_egocentric/dniu/datasets/caip_proc/pick_place_egg/action_stats_delta_eef_skip1.npz

  # Proprioceptive noise stats (run tools/compute_bkl_noise_stats.py first)
  noise_stats_path: /mnt/amlfs-02/shared/human_egocentric/dniu/datasets/caip_proc/pick_place_egg/noise_stats.npz

  # Whether to use proprioceptive state as input
  use_proprio: True

  # Which side to train on: "both", "left", or "right"
  # Controls both proprio masking (unused side's state is masked) and
  # action loss (unused side's action dims don't contribute to loss).
  # use_proprio=False still overrides: zeros ALL state regardless of side.
  side: "right"

  # BKL: 9 eef (xyz+rot6d) + 9 eef + 22 hand + 22 hand = 62
  state_dim: 62
  action_dim: 62

  # Noise stats are 56D: left_xyz(3)+left_aa(3)+right_xyz(3)+right_aa(3)+left_hand(22)+right_hand(22)
  # Always zero-mean; noise_stats_path overrides joint_noise_std when set
  joint_noise_std: 0.0
  joint_noise_std_scale: 1.0
  noisy_skip: False
  frame_skip: 1
  history_repeating: 0
  img_sample_num: -1
  skip_failure: True

  # Train-time toggle: sample random feature variants (slots 0..K-1) per camera
  # when features.h5 has num_variants > 1. Val/test always reads variant 0 (the
  # un-augmented baseline). Auto no-ops when features.h5 has num_variants == 1.
  # Extraction-time augmentation is configured via tools/extract_bkl_features.py
  # flags (--num-variants, --color-jitter, --crop-jitter, ...).
  use_augmented_features: False

  # How to reduce the 197 patch tokens per (camera, frame) to a single 768-D
  # vector. The pool module lives inside the policy (checkpointed with it).
  #   mean: drop CLS, average the 196 patch tokens. No learnable params.
  #   max:  drop CLS, max over the 196 patch tokens. No learnable params.
  #   min:  drop CLS, min over the 196 patch tokens. No learnable params.
  #   cls:  use the CLS token only. No learnable params.
  #   attn: single learned query token per camera cross-attending over all
  #         197 tokens (1 MHA layer + residual MLP, ~4.7M params per cam).
  img_pool_type: attn

actor:
  type: "transformer_concat"
  num_steps: 1
  im_dim: 768
  prompt_dim: 768
  cmd_dim: 3
  # obs_dim = prompt_dim + num_cams * im_dim + state_dim = 768 + 3*768 + 62 = 3134
  obs_dim: 3134
  # act_dim not used directly — output_dims computed in bc.py
  act_dim: 3196
  num_pred: 16
  num_exec: 1
  look_ahead: 0
  pred_type: "extrap"
  pred_action_only: True
  pred_state_only: False
  prompt_loss_weight: 0
  state_loss_weight: 0.1

mlp:
  ws: [256, 128, 64]
  init: "orthogonal"

transformer:
  pos_emb_type: sincos
  hidden_dim: 192
  num_heads: 4
  mlp_ratio: 2.0
  num_blocks: 4
  time_dropout: 0.0

transformer_concat:
  causal: True
  in_proj_hidden_sizes: []
  embed_dim: 384
  num_blocks: 6
  num_heads: 8
  mlp_ratio: 2.0
  attn_dropout: 0.0
  mlp_dropout: 0.0
  last_layer_norm: False
  head_hidden_sizes: []
  normalize_input: True

diffusion:
  num_diffusion_steps: 10

train:
  weights:
  warmup_ep: 20
  num_ep: 200
  mb_size: 512
  lr: 0.0005
  wd: 0.01
  clip_norm: 0.0

test:
  weights:
  freq: 20

wandb:
  name: bkl_pick-place-egg_vitb-mae_skip1_pred16_obs1_attnpool_noimgaug_noise1x_bodyframe-6drot_actonly_proprio_right_041726
  project: mvp-generalize
  mode: online

seed: 0
num_gpus: 8
headless: True

logdir: "/mnt/amlfs-01/home/dniu/ani/mvp-generalize-master/logs/${wandb.name}"
save_freq: 20

test_only: False

defaults:
  - _self_
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  job:
    chdir: False
  run:
    dir: .
